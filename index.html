<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harvest Valley - Hybrid Controls</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; }
        
        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a2f1a; color: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 99999; pointer-events: auto;
        }
        #loader h1 { color: #4CAF50; margin-bottom: 20px; text-shadow: 2px 2px #000; text-align: center; }
        #loader p { color: #ccc; font-size: 14px; margin-bottom: 30px; }
        
        #btn-start {
            padding: 20px 40px; font-size: 20px; background: #4CAF50; color: white; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            pointer-events: auto !important; position: relative; z-index: 100000;
        }
        #btn-start:active { transform: scale(0.95); background: #388E3C; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100;
            display: none;
        }
        
        .hud-panel {
            background: rgba(0, 0, 0, 0.7); padding: 8px; border-radius: 8px;
            color: white; margin: 10px; pointer-events: auto; backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.2);
        }

        #money-display { position: absolute; top: 10px; right: 10px; font-weight: bold; font-size: 18px; color: #FFD700; text-shadow: 1px 1px #000; }
        
        #inventory-box {
            position: absolute; top: 10px; left: 10px;
            display: grid; grid-template-columns: repeat(3, 40px); gap: 5px;
        }
        .inv-slot {
            width: 40px; height: 40px; background: rgba(255,255,255,0.1);
            border: 2px solid #555; border-radius: 4px; display: flex;
            align-items: center; justify-content: center; font-size: 10px; color: #fff;
            position: relative; font-weight: bold;
        }
        .inv-count { position: absolute; bottom: 0; right: 0; background: red; border-radius: 50%; width: 14px; height: 14px; font-size: 9px; display: flex; align-items: center; justify-content: center; border: 1px solid white; }

        #interact-msg {
            position: absolute; bottom: 30%; left: 50%; transform: translate(-50%, 0);
            background: rgba(0,0,0,0.85); color: #fff; padding: 8px 16px;
            border-radius: 20px; font-weight: bold; display: none; pointer-events: none;
            z-index: 101; border: 1px solid white; text-align: center;
        }

        /* SHOP UI */
        #shop-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 420px; background: #fff; border-radius: 10px;
            padding: 20px; display: none; flex-direction: column; align-items: center;
            z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            pointer-events: auto; touch-action: manipulation;
        }
        #shop-modal h2 { margin-top: 0; color: #2E7D32; font-family: 'Arial Black', sans-serif; border-bottom: 2px solid #ddd; width:100%; padding-bottom:10px; }
        .shop-item {
            display: flex; justify-content: space-between; width: 100%; padding: 12px 0;
            border-bottom: 1px solid #eee; align-items: center; font-size: 12px;
        }
        .btn-buy {
            background: #2E7D32; color: white; border: none; padding: 8px 14px;
            border-radius: 4px; cursor: pointer; font-weight: bold; font-family: sans-serif;
        }
        .btn-buy:active { background: #1B5E20; transform: scale(0.95); }
        .btn-buy:disabled { background: #ccc; }
        
        .btn-gold { background: #FFD700; color: black; }
        .btn-link { background: #2196F3; color: white; }
        .btn-robot { background: #FF9800; color: white; }

        .btn-close-shop {
            background: #d32f2f; color: white; border: none; padding: 10px;
            border-radius: 5px; font-weight: bold; width: 100%; margin-top: 15px;
            cursor: pointer; z-index: 2000 !important;
        }
        .btn-close-shop:active { background: #b71c1c; }

        /* COPY CONTAINER */
        .copy-container {
            margin-top:10px; display: flex; flex-direction: column; gap: 5px; width: 100%;
        }
        
        #code-result {
            font-weight: bold; color: #333; word-break: break-all; font-size: 16px; background: #eee; padding: 12px; text-align: center; border: 2px dashed #999; min-height: 45px; display: flex; align-items: center; justify-content: center;
            user-select: text; -webkit-user-select: text;
        }

        .btn-copy {
            background: #2196F3; color: white; border: none; padding: 10px 15px;
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px;
            white-space: nowrap; width: 100%;
        }
        .btn-copy:active { background: #1976D2; transform: scale(0.98); }

        /* CONTROLS (Layar HP) */
        #controls {
            position: absolute; bottom: 20px; width: 100%; height: 140px;
            display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 90;
        }
        .control-group { pointer-events: auto; }
        
        .d-pad {
            display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 50px 50px; gap: 5px;
        }
        .pad-btn {
            background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4);
            border-radius: 8px; color: white; font-size: 24px; display: flex;
            align-items: center; justify-content: center; user-select: none;
            touch-action: manipulation;
            cursor: pointer; /* Tambahkan pointer events agar bisa diklik di PC */
        }
        .pad-btn:active { background: rgba(255,255,255,0.4); }

        .action-btn {
            width: 70px; height: 70px; background: #E91E63; border-radius: 50%;
            border: 4px solid white; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            touch-action: manipulation; font-family: sans-serif;
            cursor: pointer;
        }
        .action-btn:active { transform: scale(0.95); background: #C2185B; }
    </style>
</head>
<body>

    <!-- MAIN SCRIPT -->
    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyDXKeIOlD8r0xNM61pzh82og0DBQvlnxEk",
            authDomain: "fire-me-a2f00.firebaseapp.com",
            databaseURL: "https://fire-me-a2f00-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "fire-me-a2f00",
            storageBucket: "fire-me-a2f00.firebasestorage.app",
            messagingSenderId: "1010150322376",
            appId: "1:1010150322376:web:625ab284498f3e2bea75fd"
        };
        
        let db = null;
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            console.log("Firebase Connected");
        } catch (e) {
            console.warn("Firebase init error:", e);
        }

        // --- VARIABLES ---
        let money = 0;
        window.money = 0;
        const inventory = { seed_normal: 5, seed_gold: 0, crop: 0 };
        let isShopOpen = false;
        let gameStarted = false;
        let currentCode = "";
        
        const keys = { w: false, a: false, s: false, d: false, action: false };
        const playerSpeed = 0.1;
        const camOffset = new THREE.Vector3(0, 6, 9);
        let targetRotation = 0;
        let isMoving = false;
        let currentInteractable = null;

        // --- ASSET FUNCTIONS ---
        function createFace(parentGroup, skinColor) {
            const eyeGeo = new THREE.BoxGeometry(0.15, 0.15, 0.05);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.15, 0.1, 0.41); parentGroup.add(leftEye);
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.15, 0.1, 0.41); parentGroup.add(rightEye);
            const mouthGeo = new THREE.BoxGeometry(0.3, 0.05, 0.05);
            const mouthMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.position.set(0, -0.1, 0.41); parentGroup.add(mouth);
        }

        function createRobloxChar(color, skinColor, hatType) {
            const group = new THREE.Group();
            const headGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const headMat = new THREE.MeshStandardMaterial({ color: skinColor });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.6; head.castShadow = true; group.add(head);
            createFace(head, skinColor);

            const torsoGeo = new THREE.BoxGeometry(0.6, 0.7, 0.4);
            const torsoMat = new THREE.MeshStandardMaterial({ color: color });
            const torso = new THREE.Mesh(torsoGeo, torsoMat);
            torso.position.y = 1.0; torso.castShadow = true; group.add(torso);

            const armGeo = new THREE.BoxGeometry(0.2, 0.7, 0.2);
            const armMat = new THREE.MeshStandardMaterial({ color: skinColor });
            const leftArm = new THREE.Mesh(armGeo, armMat);
            leftArm.position.set(-0.4, 1.0, 0); leftArm.castShadow = true; group.add(leftArm);
            const rightArm = new THREE.Mesh(armGeo, armMat);
            rightArm.position.set(0.4, 1.0, 0); rightArm.castShadow = true; group.add(rightArm);

            const legGeo = new THREE.BoxGeometry(0.25, 0.8, 0.25);
            const legMat = new THREE.MeshStandardMaterial({ color: 0x1e88e5 });
            const leftLeg = new THREE.Mesh(legGeo, legMat);
            leftLeg.position.set(-0.15, 0.4, 0); group.add(leftLeg);
            const rightLeg = new THREE.Mesh(legGeo, legMat);
            rightLeg.position.set(0.15, 0.4, 0); group.add(rightLeg);

            if (hatType === 'farmer') {
                const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.1, 16), new THREE.MeshStandardMaterial({ color: 0xD7CCC8 }));
                brim.position.y = 2.05; group.add(brim);
                const top = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.3, 16), new THREE.MeshStandardMaterial({ color: 0xD7CCC8 }));
                top.position.y = 2.2; group.add(top);
            } else if (hatType === 'merchant') {
                const cap = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.2, 0.9), new THREE.MeshStandardMaterial({color: 0xFFD700}));
                cap.position.set(0, 2.0, 0.05); group.add(cap);
                const visor = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.25, 0.5), new THREE.MeshStandardMaterial({color: 0xFFA000}));
                visor.position.set(0, 1.95, 0.3); group.add(visor);
            } else if (hatType === 'assist') {
                const cap = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.2, 16), new THREE.MeshStandardMaterial({color: 0xFBC02D}));
                cap.position.y = 2.1; group.add(cap);
                const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5), new THREE.MeshBasicMaterial({color:0xff0000}));
                ant.position.y = 2.3; group.add(ant);
            } else if (hatType === 'redeem') {
                const cap = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.15, 0.9), new THREE.MeshStandardMaterial({color: 0x000000}));
                cap.position.set(0, 2.1, 0.05); group.add(cap);
                const eyeGeo = new THREE.BoxGeometry(0.2, 0.2, 0.05);
                const eyeMat = new THREE.MeshBasicMaterial({color: 0x00BCD4});
                const eye1 = new THREE.Mesh(eyeGeo, eyeMat); eye1.position.set(-0.25, 2.2, 0.46); group.add(eye1);
                const eye2 = new THREE.Mesh(eyeGeo, eyeMat); eye2.position.set(0.25, 2.2, 0.46); group.add(eye2);
            }

            group.userData = { leftLeg, rightLeg, leftArm, rightArm, walkTime: 0 };
            return group;
        }

        function createCat() {
            const catGroup = new THREE.Group();
            const bodyGeo = new THREE.CylinderGeometry(0.3, 0.6, 0.5, 8);
            const furMat = new THREE.MeshStandardMaterial({ color: 0xF5F5DC });
            const body = new THREE.Mesh(bodyGeo, furMat);
            body.position.y = 0.4;
            body.castShadow = true;
            catGroup.add(body);
            const headGeo = new THREE.SphereGeometry(0.25, 16, 16);
            const head = new THREE.Mesh(headGeo, furMat);
            head.position.y = 0.7;
            head.castShadow = true;
            catGroup.add(head);
            const earGeo = new THREE.ConeGeometry(0.1, 0.15, 16);
            const leftEar = new THREE.Mesh(earGeo, furMat);
            leftEar.position.set(-0.15, 0.85, 0); leftEar.rotation.x = -0.5;
            catGroup.add(leftEar);
            const rightEar = new THREE.Mesh(earGeo, furMat);
            rightEar.position.set(0.15, 0.85, 0); rightEar.rotation.x = -0.5;
            catGroup.add(rightEar);
            const tailGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.3);
            const tail = new THREE.Mesh(tailGeo, furMat);
            tail.position.set(0, 0.6, -0.3);
            tail.rotation.x = Math.PI / 2;
            catGroup.add(tail);
            return catGroup;
        }

        // --- WORLD GENERATION ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 15, 60);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(30, 60, 30);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const groundGeo = new THREE.PlaneGeometry(150, 150);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3E2723, roughness: 1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        function createTree(x, z) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 3, 8), new THREE.MeshStandardMaterial({ color: 0x4E342E }));
            trunk.position.y = 1.5; trunk.castShadow = true; group.add(trunk);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x1B5E20 });
            const l1 = new THREE.Mesh(new THREE.ConeGeometry(1.5, 2, 8), leavesMat); l1.position.y = 3.5; group.add(l1);
            const l2 = new THREE.Mesh(new THREE.ConeGeometry(1.2, 2, 8), leavesMat); l2.position.y = 4.5; group.add(l2);
            const l3 = new THREE.Mesh(new THREE.ConeGeometry(0.8, 1.5, 8), leavesMat); l3.position.y = 5.5; group.add(l3);
            group.position.set(x, 0, z);
            scene.add(group);
        }
        for(let i=0; i<60; i++) {
            const angle = Math.random() * Math.PI * 2; const radius = 15 + Math.random() * 30;
            createTree(Math.cos(angle) * radius, Math.sin(angle) * radius);
        }

        const plots = [];
        const plotGeo = new THREE.BoxGeometry(1.9, 0.3, 1.9);
        const soilMat = new THREE.MeshStandardMaterial({ color: 0x5D4037 });
        const plantGeo = new THREE.SphereGeometry(0.3, 8, 8);
        const plantMatNormal = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
        const plantMatGold = new THREE.MeshStandardMaterial({ color: 0xFFD700 });

        for(let x = -3; x <= 3; x++) {
            for(let z = -3; z <= 3; z++) {
                const plot = new THREE.Mesh(plotGeo, soilMat);
                plot.position.set(x * 2, 0.15, z * 2);
                plot.receiveShadow = true;
                plot.userData = { isPlot: true, hasPlant: false, growth: 0, type: 'normal', plantMesh: null };
                scene.add(plot);
                plots.push(plot);
            }
        }

        // --- GEDUNG TOKO ---
        const shopGroup = new THREE.Group();
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x5D4037 });
        const floor = new THREE.Mesh(new THREE.BoxGeometry(16, 0.5, 8), woodMat);
        floor.position.set(0, 0.25, -12);
        shopGroup.add(floor);
        const wall = new THREE.Mesh(new THREE.BoxGeometry(16, 4, 0.5), woodMat);
        wall.position.set(0, 2.25, -16.5);
        shopGroup.add(wall);
        const roof = new THREE.Mesh(new THREE.ConeGeometry(8, 3, 4), new THREE.MeshStandardMaterial({color: 0x3E2723}));
        roof.position.set(0, 5.5, -12);
        roof.rotation.y = Math.PI / 4;
        shopGroup.add(roof);

        const npc1 = createRobloxChar(0xD7CCC8, 0xFFCCBC, 'farmer');
        npc1.position.set(-5, 0, -13);
        npc1.userData = { type: 'npc', role: 'farmer' };
        shopGroup.add(npc1);
        
        const npc2 = createRobloxChar(0xFFD700, 0xFFCCBC, 'merchant');
        npc2.position.set(-1.5, 0, -13);
        npc2.userData = { type: 'npc', role: 'merchant' };
        shopGroup.add(npc2);
        
        const npc3 = createRobloxChar(0xFBC02D, 0xFFCCBC, 'assist');
        npc3.position.set(2, 0, -13);
        npc3.userData = { type: 'npc', role: 'assist' };
        shopGroup.add(npc3);
        
        const npc4 = createRobloxChar(0x000000, 0xFFCCBC, 'redeem');
        npc4.position.set(5.5, 0, -13);
        npc4.userData = { type: 'npc', role: 'redeem' };
        shopGroup.add(npc4);

        scene.add(shopGroup);

        const player = createRobloxChar(0xE91E63, 0xFFCCBC, null);
        player.position.set(0, 0, 5);
        scene.add(player);

        const pet = createCat();
        scene.add(pet);

        // --- UI LOGIC ---
        function updateUI() {
            document.getElementById('money-val').innerText = Math.floor(money);
            window.money = money;
            document.getElementById('count-0').innerText = inventory.seed_normal;
            document.getElementById('count-1').innerText = inventory.crop;
            document.getElementById('count-2').innerText = inventory.seed_gold;
        }

        window.closeShop = function() {
            document.getElementById('shop-modal').style.display = 'none';
            document.getElementById('redeem-section').style.display = 'none';
            isShopOpen = false;
            currentInteractable = null;
        };

        window.openShop = function(type) {
            isShopOpen = true;
            const modal = document.getElementById('shop-modal');
            const title = document.getElementById('shop-title');
            const list = document.getElementById('shop-items');
            const redeemSec = document.getElementById('redeem-section');
            
            list.innerHTML = '';
            document.getElementById('code-result').innerText = '';
            document.getElementById('code-result').style.color = "#333";
            document.getElementById('btn-copy-code').innerText = "ðŸ“‹ TUNGGU...";
            document.getElementById('btn-copy-code').disabled = true;
            document.getElementById('copy-status').innerText = "";
            redeemSec.style.display = 'none';

            if (type === 'farmer') {
                title.innerText = "TOKO PETERNAK";
                const item = document.createElement('div');
                item.className = 'shop-item';
                item.innerHTML = `<span>Bibit Wortel (10)</span><button class="btn-buy" id="btn-seed-buy">BELI (50)</button>`;
                list.appendChild(item);
                document.getElementById('btn-seed-buy').onclick = function() {
                    if(money >= 50) { money -= 50; inventory.seed_normal += 10; updateUI(); } 
                    else { alert("Uang tidak cukup!"); }
                };
                const sellItem = document.createElement('div');
                sellItem.className = 'shop-item';
                sellItem.innerHTML = `<span>Jual Wortel (All)</span><button class="btn-buy" id="btn-sell-crops">JUAL</button>`;
                list.appendChild(sellItem);
                document.getElementById('btn-sell-crops').onclick = function() {
                    if(inventory.crop > 0) { money += inventory.crop * 20; inventory.crop = 0; updateUI(); }
                };

            } else if (type === 'merchant') {
                title.innerText = "MERCHANT MAHAL";
                const item = document.createElement('div');
                item.className = 'shop-item';
                item.innerHTML = `<span>Bibit Emas Premium (1)</span><button class="btn-buy btn-gold" id="btn-gold-buy">BELI (500)</button>`;
                list.appendChild(item);
                document.getElementById('btn-gold-buy').onclick = function() {
                    if(money >= 500) { money -= 500; inventory.seed_gold += 1; updateUI(); } 
                    else { alert("Uang tidak cukup!"); }
                };

            } else if (type === 'assist') {
                title.innerText = "ROBOT TANI";
                const item = document.createElement('div');
                item.className = 'shop-item';
                item.innerHTML = `<span>Jasa Robot (Tanam & Panen)</span><button class="btn-buy btn-robot" id="btn-hire-robot">SEWA (300)</button>`;
                list.appendChild(item);
                document.getElementById('btn-hire-robot').onclick = function() {
                    if(money >= 300) {
                        money -= 300; updateUI();
                        let plotsModified = 0;
                        plots.forEach(plot => {
                            if (plot.userData.hasPlant && plot.userData.growth >= 100) {
                                inventory.crop += 5;
                                plot.userData.hasPlant = false; plot.userData.growth = 0;
                                if(plot.userData.plantMesh) { plot.remove(plot.userData.plantMesh); plot.userData.plantMesh = null; }
                                plotsModified++;
                            } else if (!plot.userData.hasPlant) {
                                let planted = false;
                                if (inventory.seed_normal > 0) { inventory.seed_normal--; planted = 'normal'; }
                                else if (inventory.seed_gold > 0) { inventory.seed_gold--; planted = 'gold'; }
                                if(planted) {
                                    plot.userData.hasPlant = true; plot.userData.growth = 0; plot.userData.type = planted;
                                    const pMat = planted === 'normal' ? plantMatNormal : plantMatGold;
                                    const mesh = new THREE.Mesh(plantGeo, pMat);
                                    mesh.position.set(0, 0.3, 0); mesh.scale.set(0.1, 0.1, 0.1);
                                    plot.add(mesh); plot.userData.plantMesh = mesh;
                                    plotsModified++;
                                }
                            }
                        });
                        updateUI(); alert(`Robot bekerja! ${plotsModified} lahan diproses.`);
                    } else { alert("Uang tidak cukup!"); }
                };

            } else if (type === 'redeem') {
                title.innerText = "REDEEM CENTER";
                const item = document.createElement('div');
                item.className = 'shop-item';
                item.innerHTML = `<span>Buka Website Redeem</span><button class="btn-buy btn-link" id="btn-go-redeem">BUKA LINK</button>`;
                list.appendChild(item);
                document.getElementById('btn-go-redeem').onclick = function() {
                    window.open('https://knighttora-sketch.github.io/Cokiredeem/', '_blank');
                };
                redeemSec.style.display = 'block';
            }

            modal.style.display = 'flex';
        };

        // --- MANUAL COPY BUTTON ---
        document.getElementById('btn-copy-code').addEventListener('click', () => {
            const resDiv = document.getElementById('code-result');
            const range = document.createRange();
            range.selectNode(resDiv);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            
            try {
                document.execCommand('copy');
                document.getElementById('copy-status').innerText = "Teks terpilih! Paste manual (Ctrl+V).";
                setTimeout(() => document.getElementById('copy-status').innerText = "", 3000);
            } catch (err) {
                document.getElementById('copy-status').innerText = "Silakan blok teks manual.";
            }
        });

        // --- BUY & AUTO COPY LOGIC ---
        document.getElementById('btn-buy-code').addEventListener('click', () => {
            const resDiv = document.getElementById('code-result');
            const btnCopy = document.getElementById('btn-copy-code');
            const statusDiv = document.getElementById('copy-status');
            const HARGA_CODE = 500;
            
            resDiv.innerText = "Mengecek Saldo...";
            resDiv.style.color = "#333";
            btnCopy.disabled = true;
            btnCopy.innerText = "ðŸ“‹ TUNGGU...";
            statusDiv.innerText = "";
            
            if (money < HARGA_CODE) {
                alert(`Uang tidak cukup! Butuh ${HARGA_CODE} Uang. Saldo Anda: ${Math.floor(money)}`);
                resDiv.innerText = "Uang Kurang";
                resDiv.style.color = "red";
                return;
            }

            if (!db) { 
                resDiv.innerText = "Error: DB Offline"; 
                resDiv.style.color = "red";
                btnCopy.disabled = false;
                btnCopy.innerText = "ðŸ“‹ COBA LAGI";
                return; 
            }

            const codesRef = ref(db, 'codes');
            
            get(codesRef).then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const keys = Object.keys(data);
                    
                    if (keys.length > 0) {
                        const randomIndex = Math.floor(Math.random() * keys.length);
                        const selectedKey = keys[randomIndex];
                        
                        money -= HARGA_CODE;
                        updateUI();
                        currentCode = selectedKey;

                        resDiv.innerText = selectedKey;
                        resDiv.style.color = "green";
                        resDiv.style.fontWeight = "bold";
                        resDiv.style.fontSize = "20px";
                        
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            navigator.clipboard.writeText(selectedKey).then(() => {
                                statusDiv.innerText = "âœ… Otomatis Disalin!";
                                btnCopy.innerText = "ðŸ“‹ DISALIN!";
                                btnCopy.disabled = true;
                            }).catch(err => {
                                btnCopy.innerText = "ðŸ“‹ SALIN MANUAL";
                                btnCopy.disabled = false;
                                statusDiv.innerText = "Auto copy gagal. Tekan tombol di bawah.";
                            });
                        } else {
                            btnCopy.innerText = "ðŸ“‹ SALIN MANUAL";
                            btnCopy.disabled = false;
                            statusDiv.innerText = "Browser tidak support auto-copy. Gunakan tombol manual.";
                        }

                    } else {
                        alert("Stok Kode HABIS! Uang dikembalikan.");
                        money += HARGA_CODE;
                        updateUI();
                        resDiv.innerText = "Stok HABIS";
                        resDiv.style.color = "red";
                        btnCopy.disabled = true;
                        btnCopy.innerText = "ðŸ“‹ KOSONG";
                    }
                } else {
                    alert("Database Kosong! Uang dikembalikan.");
                    money += HARGA_CODE;
                    updateUI();
                    resDiv.innerText = "Database Kosong";
                    resDiv.style.color = "red";
                    btnCopy.disabled = true;
                    btnCopy.innerText = "ðŸ“‹ ERROR";
                }
            }).catch((error) => {
                alert("Gagal mengambil data! Uang dikembalikan.");
                money += HARGA_CODE;
                updateUI();
                resDiv.innerText = "Error Koneksi!";
                resDiv.style.color = "red";
                console.error("Error Koneksi:", error);
                btnCopy.disabled = false;
                btnCopy.innerText = "ðŸ“‹ COBA LAGI";
            });
        });

        document.getElementById('btn-close-shop').addEventListener('click', window.closeShop);

        // --- GAME LOGIC ---
        function doAction() {
            if (isShopOpen) return;

            if (currentInteractable) {
                if (currentInteractable.userData.isPlot) {
                    const plot = currentInteractable;
                    if (!plot.userData.hasPlant) {
                        let seedType = null;
                        if (inventory.seed_normal > 0) { inventory.seed_normal--; seedType = 'normal'; }
                        else if (inventory.seed_gold > 0) { inventory.seed_gold--; seedType = 'gold'; }

                        if (seedType) {
                            plot.userData.hasPlant = true; plot.userData.growth = 0; plot.userData.type = seedType;
                            const pMat = seedType === 'normal' ? plantMatNormal : plantMatGold;
                            const mesh = new THREE.Mesh(plantGeo, pMat);
                            mesh.position.set(0, 0.3, 0); mesh.scale.set(0.1, 0.1, 0.1);
                            plot.add(mesh); plot.userData.plantMesh = mesh;
                            updateUI();
                        } else { alert("Tidak punya bibit!"); }
                    } else {
                        if (plot.userData.growth >= 100) {
                            if (plot.userData.type === 'normal') inventory.crop += 5;
                            else if (plot.userData.type === 'gold') { inventory.crop += 5; money += 150; }
                            plot.userData.hasPlant = false; plot.userData.growth = 0;
                            if(plot.userData.plantMesh) { plot.remove(plot.userData.plantMesh); plot.userData.plantMesh = null; }
                            updateUI();
                        } else { alert("Belum siap panen!"); }
                    }
                } else if (currentInteractable.userData.type === 'npc') {
                    window.openShop(currentInteractable.userData.role);
                }
            }
        }

        // --- HYBRID CONTROLS (PC & HP) ---
        
        // 1. Setup State Tombol
        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnAction = document.getElementById('btn-action');

        // 2. Fungsi Update Input (Dipanggil Keyboard & Tombol Layar)
        function setInput(key, state) {
            keys[key] = state;
        }

        // 3. Event Keyboard PC
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') setInput('w', true);
            if (e.code === 'ArrowDown' || e.code === 'KeyS') setInput('s', true);
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') setInput('a', true);
            if (e.code === 'ArrowRight' || e.code === 'KeyD') setInput('d', true);
            if (e.code === 'Space') {
                if (!keys.action) doAction();
                keys.action = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') setInput('w', false);
            if (e.code === 'ArrowDown' || e.code === 'KeyS') setInput('s', false);
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') setInput('a', false);
            if (code === 'ArrowRight' || e.code === 'KeyD') setInput('d', false);
            if (e.code === 'Space') setInput('action', false);
        });

        // 4. Event Mouse/Touch HP (Hybrid)
        // MouseDown & TouchStart
        const pressStart = (elem, key) => {
            elem.addEventListener('mousedown', (e) => { e.preventDefault(); setInput(key, true); });
            elem.addEventListener('touchstart', (e) => { e.preventDefault(); setInput(key, true); });
        };
        // MouseUp & TouchEnd
        const pressEnd = (elem, key) => {
            elem.addEventListener('mouseup', (e) => { e.preventDefault(); setInput(key, false); });
            elem.addEventListener('touchend', (e) => { e.preventDefault(); setInput(key, false); });
        };

        // Pasang ke Tombol Action (Spasi) -> Trigger sekali klik
        const triggerAction = (elem) => {
            elem.addEventListener('mousedown', (e) => { e.preventDefault(); setInput('action', true); doAction(); });
            elem.addEventListener('touchstart', (e) => { e.preventDefault(); setInput('action', true); doAction(); });
            elem.addEventListener('mouseup', (e) => { e.preventDefault(); setInput('action', false); });
            elem.addEventListener('touchend', (e) => { e.preventDefault(); setInput('action', false); });
        };

        // Pasang ke Tombol Arah
        pressStart(btnUp, 'w');
        pressStart(btnDown, 's');
        pressStart(btnLeft, 'a');
        pressStart(btnRight, 'd');
        pressEnd(btnUp, 'w');
        pressEnd(btnDown, 's');
        pressEnd(btnLeft, 'a');
        pressEnd(btnRight, 'd');

        // Pasang ke Tombol Action
        triggerAction(btnAction);

        // --- START GAME BUTTON ---
        document.getElementById('btn-start').addEventListener('click', (e) => {
            e.preventDefault();
            console.log("Game dimulai!");
            document.getElementById('loader').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            gameStarted = true;
            
            const targetCamPos = new THREE.Vector3().copy(player.position).add(camOffset);
            camera.position.copy(targetCamPos);
            camera.lookAt(player.position);
        });

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (!gameStarted) {
                renderer.render(scene, camera);
                return;
            }

            if (!isShopOpen) {
                let dx = 0; let dz = 0;
                if (keys.w) dz -= playerSpeed;
                if (keys.s) dz += playerSpeed;
                if (keys.a) dx -= playerSpeed;
                if (keys.d) dx += playerSpeed;

                if (dx !== 0 || dz !== 0) {
                    isMoving = true;
                    player.position.x += dx;
                    player.position.z += dz;
                    
                    targetRotation = Math.atan2(dx, dz);
                    player.rotation.y = targetRotation;

                    const time = Date.now() * 0.01;
                    player.userData.leftLeg.rotation.x = Math.sin(time) * 0.5;
                    player.userData.rightLeg.rotation.x = Math.sin(time + Math.PI) * 0.5;
                    player.userData.leftArm.rotation.x = Math.sin(time + Math.PI) * 0.5;
                    player.userData.rightArm.rotation.x = Math.sin(time) * 0.5;

                    const dist = player.position.distanceTo(pet.position);
                    if (dist > 3) {
                        pet.position.x += (player.position.x - pet.position.x) * 0.05;
                        pet.position.z += (player.position.z - pet.position.z) * 0.05;
                        pet.lookAt(player.position);
                    }
                } else {
                    isMoving = false;
                    player.userData.leftLeg.rotation.x = 0;
                    player.userData.rightLeg.rotation.x = 0;
                }

                const targetCamPos = new THREE.Vector3().copy(player.position).add(camOffset);
                camera.position.lerp(targetCamPos, 0.1);
                camera.lookAt(player.position);

                let foundInteract = null;
                let minDist = 2.5;

                plots.forEach(plot => {
                    const d = player.position.distanceTo(plot.position);
                    if (d < minDist) {
                        minDist = d;
                        foundInteract = plot;
                    }
                });

                shopGroup.children.forEach(child => {
                    if(child.userData.type === 'npc') {
                        const d = player.position.distanceTo(child.position);
                        if (d < minDist) {
                            minDist = d;
                            foundInteract = child;
                        }
                    }
                });

                currentInteractable = foundInteract;
                const msg = document.getElementById('interact-msg');
                if (currentInteractable) {
                    msg.style.display = 'block';
                    if(currentInteractable.userData.isPlot) {
                        msg.innerText = currentInteractable.userData.hasPlant ? "PANEN" : "TANAM";
                    } else {
                        msg.innerText = "TOKO " + currentInteractable.userData.role.toUpperCase();
                    }
                } else {
                    msg.style.display = 'none';
                }

                plots.forEach(plot => {
                    if (plot.userData.hasPlant && plot.userData.growth < 100) {
                        plot.userData.growth += 0.05;
                        if (plot.userData.plantMesh) {
                            const scale = 0.1 + (plot.userData.growth / 100) * 0.9;
                            plot.userData.plantMesh.scale.set(scale, scale, scale);
                            if(plot.userData.growth >= 100) {
                                plot.userData.plantMesh.material.color.setHex(0xFF9800);
                            }
                        }
                    }
                });
            }

            renderer.render(scene, camera);
        }

        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
